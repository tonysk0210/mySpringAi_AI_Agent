spring.application.name=mcp-server
################ Log 相關設定 ################
# Log format: green = 時間 / blue = log等級 / red = thread名稱 / yellow = log名稱 / white = log內容
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
################ H2 Database 相關設定 ################
# File-based H2 會寫入 ./h2db；schema.sql 會在啟動時 DROP ALL OBJECTS，確保每次重啟回到 demo 初始資料。
spring.datasource.url=jdbc:h2:file:./h2db/mcpserverdb;AUTO_SERVER=true
# In-memory H2 每次 JVM 重啟都會重建；若不想寫入 h2db，可切回這行。
# spring.datasource.url=jdbc:h2:mem:mcpserverdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# 啟用 H2 Console
spring.h2.console.enabled=true
# 指定 SQL 初始化腳本位置；目前不是 optional: 前綴，檔案必須存在於 classpath:sql/ 下。
spring.sql.init.schema-locations=classpath:sql/schema.sql
spring.sql.init.data-locations=classpath:sql/data.sql
# always: file-based H2 也要執行 schema.sql / data.sql，才能重建 demo 初始資料
spring.sql.init.mode=always
# 關閉 JPA 自動 DDL，由 schema.sql 全權管理 schema，避免衝突
spring.jpa.hibernate.ddl-auto=none
# App 啟動
#      │
#      ├─ 1. Spring 執行 schema.sql   ← 建立資料表（IF NOT EXISTS）
#      ├─ 2. Spring 執行 data.sql     ← 植入種子資料（MERGE INTO）
#      └─ 3. Hibernate 啟動           ← ddl-auto=none，不自動建立或修改 schema
# 關閉 OSIV：tool 方法在 @Transactional 內已將資料裝進 DTO，
# EntityManager 不需要撐到 JSON 序列化階段；可更早釋放持久化上下文與資料庫資源。
spring.jpa.open-in-view=false
################ MCP Server streamable HTTP remote 相關設定 ################
server.port=8090
spring.ai.mcp.server.name=my-mcp-server
spring.ai.mcp.server.version=0.0.1
# MCP client 初始化連線時會取得這段 instructions，用來理解這個 MCP Server 的用途與適合呼叫的情境。
spring.ai.mcp.server.instructions=Tools for an email support agent: look up customers, \
  orders and products; detect duplicate charges; check warranty windows; review ticket \
  history for repeat failures; issue refunds; and log the resolution.
# 指定 MCP Server 使用 Streamable HTTP transport；WebMVC starter 會提供 HTTP endpoint 讓 MCP client 遠端連線。
spring.ai.mcp.server.protocol=streamable
# Streamable HTTP MCP Server 對外提供的 MCP endpoint 路徑；預設值就是 /mcp，明寫是為了讓 client 端連線位置更清楚。
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp
