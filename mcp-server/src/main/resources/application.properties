spring.application.name=mcp-server
################ Log 相關設定 ################
# Log formate: green = 時間 / blue = log等級 / red = thread名稱 / yellow = log名稱 / white = log內容
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
################ H2 Database 相關設定 ################
spring.datasource.url=jdbc:h2:file:./h2db/mcpserverdb;AUTO_SERVER=true
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# 啟用 H2 Console
spring.h2.console.enabled=true
# schema.sql 和 data.sql 的位置; 這裡使用 classpath:sql/schema.sql 和 classpath:sql/data.sql 作為 SQL 初始化腳本的位置 optional: 表示如果文件不存在則不會報錯
spring.sql.init.schema-locations=classpath:sql/schema.sql
spring.sql.init.data-locations=classpath:sql/data.sql
# always: file-based H2 不算 embedded，需要明確設定才會執行 schema.sql / data.sql
spring.sql.init.mode=always
# 關閉 JPA 自動 DDL，由 schema.sql 全權管理 schema，避免衝突
spring.jpa.hibernate.ddl-auto=none
#  App 啟動
#      │
#      ├─ 1. Spring 執行 schema.sql   ← 建立資料表（IF NOT EXISTS）
#      ├─ 2. Spring 執行 data.sql     ← 植入種子資料（MERGE INTO）
#      └─ 3. Hibernate 啟動           ← 什麼都不做，不碰 schema
# 關閉 OSIV：tool 方法在 @Transactional 內已將資料裝進 DTO，
# 連線可在 return 後立即關閉（true 則撐到 JSON 序列化完才關），提早還回連線池不白佔資源。
spring.jpa.open-in-view=false
################ MCP Server streamable HTTP remote 相關設定 ################
server.port=8090
spring.ai.mcp.server.name=my-mcp-server
spring.ai.mcp.server.version=0.0.1
# Agent 連線時會先讀這段 instructions，用來判斷這個 MCP Server 能做什麼、什麼時候該呼叫它
spring.ai.mcp.server.instructions=Tools for an email support agent: look up customers, \
  orders and products; detect duplicate charges; check warranty windows; review ticket \
  history for repeat failures; issue refunds; and log the resolution.
# 指定 MCP Server 使用 Streamable HTTP 傳輸協定，讓 Agent 透過 HTTP 遠端連線，而不是只能在同一個 JVM 內呼叫。
spring.ai.mcp.server.protocol=streamable