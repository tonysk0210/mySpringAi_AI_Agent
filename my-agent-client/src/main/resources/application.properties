spring.application.name=my-agent-client
################ Log 相關設定 ################
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
# 開啟 PrettyLoggerAdvisor 與 SimpleLoggerAdvisor 的 DEBUG 等級日誌，用來觀察 ChatClient 的 prompt/response 流程。
logging.level.com.example.myagentclient.advisor.PrettyLoggerAdvisor=DEBUG
logging.level.org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor=DEBUG
################ OpenAI 相關設定 ###############
spring.ai.openai.api-key=${OPENAI_API_KEY}
################ MCP Client 連線 相關設定 ################
# 設定一個名為 mcp-server 的 Spring AI MCP Client 連線；使用 Streamable HTTP 連到既有的 MCP Server。
# url 是 MCP Server 的基底網址；endpoint 預設為 /mcp，這裡明寫是為了讓完整端點 http://localhost:8090/mcp 更清楚。
spring.ai.mcp.client.streamable-http.connections.mcp-server.url=http://localhost:8090
spring.ai.mcp.client.streamable-http.connections.mcp-server.endpoint=/mcp
################ Mailpit SMTP 寄件 相關設定 ################
# compose.yaml 負責啟動 Mailpit，並將主機的 1025 port 對應到 Mailpit 容器的 SMTP port。
# 這裡負責設定 Spring Boot 寄信時要連到哪個 SMTP server。
# 目前 Spring Boot 在本機執行，所以連 localhost:1025；若 Spring Boot 也放進 Docker Compose，host 應改為 mailpit。
spring.mail.host=localhost
spring.mail.port=1025
# 本機 Mailpit 測試環境不需要 SMTP 帳號密碼驗證。
spring.mail.properties.mail.smtp.auth=false
# 本機 Mailpit 測試環境不需要啟用 STARTTLS 加密連線。
spring.mail.properties.mail.smtp.starttls.enable=false
################ 自定義 my-agent-client 收件 相關設定 ################
# Mailpit HTTP API / Web UI 的基底網址；Agent 會透過這個網址查詢、讀取、標記郵件。
my-agent-client.inbox.base-url=http://localhost:8025
# Agent 監控的支援信箱地址；測試郵件會寄到這個地址，查詢未讀信時也會用它作為收件人條件。
my-agent-client.inbox.address=support@example.com
# 收件匣輪詢間隔，單位為毫秒；10000ms = 每次處理完成後等待 10 秒再輪詢下一次。
my-agent-client.inbox.poll-interval=10000
# 每次輪詢最多抓取的未讀郵件數量。
my-agent-client.inbox.batch-size=50
